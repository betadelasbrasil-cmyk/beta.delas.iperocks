<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Abrir link</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6f8;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 18px;
    }
    
    .card {
      background: white;
      padding: 45px 35px;
      border-radius: 16px;
      width: 92%;
      max-width: 560px;
      text-align: center;
      box-shadow: 0 12px 30px rgba(0,0,0,0.10);
    }
    
    h2 {
      margin-bottom: 15px;
      font-size: 26px;
    }
    
    p {
      color: #444;
      line-height: 1.6;
      font-size: 17px;
    }
    
    .note {
      font-size: 13px;
      color: #888;
      margin-top: 18px;
    }
    
    .btn {
      display: inline-block;
      margin-top: 22px;
      padding: 16px 26px;
      background: #7CFC98; /* verde claro */
      color: #0b3d1f;
      text-decoration: none;
      font-weight: bold;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(124, 252, 152, 0.4);
      transition: 0.2s ease;
      font-size: 18px;
    }
    
    .btn:hover {
      transform: scale(1.03);
    }
  </style>
</head>

<body>

  <div class="card">

    <h2>Para continuar</h2>

    <p>
      Se abrir dentro do Instagram, toque nos <b>3 pontos</b> e escolha: <br>
      <b>Abrir no navegador</b>
    </p>

    <a class="btn" href="https://script.google.com/macros/s/AKfycbw1fGWk9WCQx-cp7TNaw9teNhA5ipZCXnXWTOUNcH0PtziPylx-XQRBCxkeDFLaE5ft/exec">
      Continuar
    </a>

    <div class="note">
      Observação: Este app foi criado através do Google Apps Script. O navegador interno do Instagram pode limitar algumas funcionalidades.
    </div>

  </div>

</body>
</html>
